name: E2E Tests

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC nightly
  pull_request:
    types: [labeled]
  workflow_dispatch:

env:
  # Force wrapper mode (not async/daemon) so post-commit hooks fire
  # synchronously and attribution notes are written in-process.
  GIT_AI_ASYNC_MODE: "false"

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'integration')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install jq
        run: |
          sudo apt-get install -y jq

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global init.defaultBranch main

      - name: Run E2E tests
        run: |
          task test:e2e
